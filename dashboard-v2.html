<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>КБК — дашборд клуба</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0; background:transparent; overflow:hidden; position:relative; -webkit-text-size-adjust:100%; font-family:'Inter',-apple-system,system-ui,sans-serif; color:#2b1530; -webkit-font-smoothing:antialiased;}
#dash{position:absolute; top:0; bottom:0; left:0; right:0; max-width:460px; margin:0 auto; padding:14px 16px 28px; overflow:hidden;}
.tabs{display:flex; gap:10px; overflow-x:auto; padding:18px 20px 14px; scrollbar-width:none; border-bottom:1px solid #f1edf2; flex:0 0 auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto; border:none; background:#F1EFF4; color:#2b1530; font-weight:700; font-size:14.5px; padding:12px 20px; border-radius:999px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:.15s;}
.tab.active{background:#15151a; color:#fff;}
.panel{position:relative; background:#fff; border-radius:26px; padding:0; overflow:hidden; border:3px solid #ffffff; margin-top:0; height:calc(100vh - 46px); max-height:600px; min-height:400px; display:flex; flex-direction:column;}


.eyebrow{color:#fc82b8; font-weight:700; font-size:13px; margin-bottom:8px;}
.ptitle{font-weight:800; font-size:27px; color:#15151a; letter-spacing:-.5px; line-height:1.05;}
.pdesc{color:#6f6676; font-size:15px; line-height:1.4; margin:12px 0 0; max-width:340px;}
.gridwrap{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:18px 20px 22px; scrollbar-width:thin;}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.rcard,.ccard,.pcard{cursor:pointer; transition:transform .12s;}
.rcard:active,.ccard:active,.pcard:active{transform:scale(.98);}
.rcard .rimg{aspect-ratio:1/1; border-radius:18px; overflow:hidden; background:#efe3ec;}
.rcard .rimg img{width:100%; height:100%; object-fit:cover; display:block;}
.rcard .rname{text-align:center; font-weight:700; font-size:14px; margin-top:11px; color:#2b1530; line-height:1.25;}
.ccard{background:#FBF8FB; border-radius:20px; overflow:hidden; box-shadow:0 8px 22px -18px rgba(0,0,0,.35);}
.ccard .cimg{aspect-ratio:1/1; background:#EFE3EC;}
.ccard .cimg img{width:100%; height:100%; object-fit:cover; display:block;}
.ccard .cbody{padding:14px 14px 16px;}
.ccard .cname{font-weight:800; font-size:15px; color:#2b1530; line-height:1.22;}
.ccard .cdesc{font-size:12.5px; color:#8a8190; margin-top:6px; line-height:1.3;}
.pcard{border-radius:22px; overflow:hidden; color:#fff; background:linear-gradient(180deg,#ffa9cf 0%,#fc82b8 52%,#ee5f9f 100%); box-shadow:0 14px 34px -20px rgba(238,95,159,.7);}
.pcard .pimg{position:relative;}
.psoon{position:absolute; top:10px; left:10px; z-index:2; background:#ffffff; color:#15151a; font-weight:800; font-size:11.5px; letter-spacing:.03em; padding:5px 11px; border-radius:999px; box-shadow:0 2px 8px rgba(0,0,0,.12);}
.dimg{position:relative;}
.pimg{height:190px; background:rgba(255,255,255,.06);}
.pcard .pimg img{width:100%; height:100%; object-fit:cover; display:block;}
.pcard .pbody{padding:14px 16px 18px;}
.pcard .pname{font-weight:800; font-size:16px; line-height:1.2;}
.pcard .pdesc{font-size:12.5px; color:#fff; opacity:1; font-weight:600; margin-top:6px; line-height:1.3;}
/* detail */
.dback{align-self:flex-start; border:none; background:#F1EFF4; color:#2b1530; font-family:inherit; font-weight:700; font-size:14px; padding:9px 16px 9px 12px; border-radius:999px; cursor:pointer; margin:16px 0 0 20px; display:flex; align-items:center; gap:6px; flex:0 0 auto;}
.dscroll{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:18px 20px 22px;}
.dimg{border-radius:18px; overflow:hidden; background:#efe3ec; margin-bottom:16px; aspect-ratio:4/3;}
.dimg img{width:100%; height:100%; object-fit:cover; display:block;}
.dsub{color:#fc82b8; font-weight:700; font-size:13px; margin-bottom:7px;}
.dtitle{font-weight:800; font-size:23px; color:#15151a; letter-spacing:-.3px; line-height:1.12;}
.dtext{color:#4a4350; font-size:15px; line-height:1.5; margin-top:14px;}
.dprog{font-weight:700; color:#2b1530; font-size:15px; margin:18px 0 8px;}
.dlist{margin:0; padding:0; list-style:none;}
.dlist li{position:relative; padding:7px 0 7px 18px; font-size:14.5px; color:#4a4350; border-bottom:1px solid #f0edf2;}
.dlist li:before{content:''; position:absolute; left:0; top:15px; width:6px; height:6px; border-radius:50%; background:#fc82b8;}
@media(max-width:380px){ .ptitle{font-size:24px;} }
.list{display:flex; flex-direction:column;}
.lrow{display:flex; align-items:center; gap:14px; background:#fff; border-radius:18px; padding:15px 16px; margin-bottom:12px; box-shadow:0 8px 22px -18px rgba(0,0,0,.35); cursor:pointer; transition:transform .12s;}
.lrow:active{transform:scale(.99);}
.lrow.noopen{cursor:default;}
.lrow.noopen:active{transform:none;}
.lrow .lic{width:52px; height:52px; border-radius:14px; flex:0 0 52px; background:rgba(252,130,184,.10); display:flex; align-items:center; justify-content:center; color:#fc82b8;}
.lrow .lic svg{width:22px; height:22px;}
.lrow .ltext{flex:1; min-width:0;}
.lrow .lname{font-weight:800; font-size:16px; color:#2b1530; line-height:1.22;}
.lrow .lsub{font-size:13px; color:#9a93a0; margin-top:3px;}
.intro{padding:6px 4px 20px;}
.ieyebrow{color:#fc82b8; font-weight:700; font-size:13px; margin-bottom:10px;}
.ititle{font-weight:800; font-size:33px; color:#15151a; letter-spacing:-.8px; line-height:1.03;}
.idesc{color:#6f6676; font-size:16px; line-height:1.45; margin-top:14px; max-width:380px;}
.phead{padding:2px 0 16px;}
@media(max-width:380px){ .ititle{font-size:28px;} }
.dgal{margin-top:12px;}

.chero{position:relative; border-radius:22px; overflow:hidden; height:210px; margin-bottom:22px; cursor:default;}

.chero .cheroimg{position:absolute; inset:0;}
.chero .cheroimg img{width:100%; height:100%; object-fit:cover; display:block;}
.chero .cheroscrim{position:absolute; inset:0; background:linear-gradient(180deg,rgba(12,6,12,.50) 0%,rgba(12,6,12,.58) 35%,rgba(12,6,12,.56) 65%,rgba(12,6,12,.20) 88%,rgba(12,6,12,.16) 100%);}
.chero .cheroin{position:absolute; inset:0; padding:20px 22px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
.chero .cherottl{font-weight:800; font-size:23px; color:#fff; letter-spacing:-.3px; text-shadow:0 1px 10px rgba(0,0,0,.30);}
.chero .cherodesc{color:#fff; font-size:13px; line-height:1.35; margin:8px auto 0; max-width:300px; opacity:.96; text-shadow:0 1px 8px rgba(0,0,0,.32);}
.chero .cherobtn{display:inline-block; background:#fff; color:#15151a; font-weight:800; font-size:14px; padding:11px 28px; border-radius:999px; margin-top:14px; box-shadow:0 8px 20px -10px rgba(0,0,0,.5);}
.pastlbl{color:#8a8190; font-weight:700; font-size:15px; margin:2px 2px 14px;}
.mlist{display:flex; flex-direction:column;}
.mrow{display:flex; align-items:center; gap:14px; background:#fff; border-radius:20px; padding:13px 16px; margin-bottom:14px; box-shadow:0 10px 26px -20px rgba(0,0,0,.4); cursor:default;}

.mrow .mthumb{width:58px; height:58px; border-radius:50%; overflow:hidden; flex:0 0 58px; background:#EFE3EC;}
.mrow .mthumb img{width:100%; height:100%; object-fit:cover; display:block;}
.mrow .mname{flex:1; min-width:0; font-weight:800; font-size:17px; color:#2b1530;}
.mrow .mchev{color:#cfc8d3; display:flex; align-items:center;}
.mrow .mchev svg{width:20px; height:20px;}

.dlessons{margin-top:6px;}
.dles{padding:13px 0; border-bottom:1px solid #f0edf2;}
.dles:last-child{border-bottom:none;}
.dles-t{font-weight:800; font-size:15px; color:#2b1530; line-height:1.25;}
.dles-s{font-size:13px; color:#8a8190; margin-top:4px; line-height:1.35;}
.pbadge{display:inline-block; background:#fc82b8; color:#fff; font-weight:800; font-size:12px; letter-spacing:.2px; padding:6px 13px; border-radius:999px; margin-bottom:12px;}

/* --- десктоп --- */
@media(min-width:640px){
  #dash{max-width:920px; padding:16px 20px 28px;}
  .panel{height:calc(100vh - 48px); max-height:700px; border-radius:28px;}
  .tabs{padding:16px 22px 12px;}
  .tabs .tab{font-size:12.5px; padding:8px 14px;}
  .gridwrap{padding:20px 24px 24px;}
  .phead{padding:2px 0 16px;}
  .ptitle{font-size:24px;}
  .pdesc{max-width:520px; font-size:14px;}
  .grid{grid-template-columns:repeat(4,1fr); gap:16px;}
  .grid:has(.pcard){grid-template-columns:repeat(3,1fr);}
  .pcard .pimg{height:185px;}
  .list{display:grid; grid-template-columns:1fr 1fr; gap:0 18px; align-content:start;}
  .chero{height:280px;}
  .chero .cherodesc{max-width:440px; font-size:14px;}
  .mlist{display:grid; grid-template-columns:1fr 1fr; gap:0 18px; align-content:start;}
  .dback{margin:20px 0 0 28px;}
  .dscroll{padding:24px 28px 30px;}
  .dscroll > *{max-width:720px; margin-left:auto; margin-right:auto;}
  .dimg{aspect-ratio:16/9;}
  .dgal{grid-template-columns:repeat(3,1fr);}
}

/* Тильда: планшет вертикально 640-959 */
@media(min-width:640px) and (max-width:959px){
  #dash{max-width:720px;}
  .grid{grid-template-columns:repeat(3,1fr);}
  .grid:has(.pcard){grid-template-columns:repeat(2,1fr);}
  .pcard .pimg{height:200px;}
  .dgal{grid-template-columns:repeat(3,1fr);}
}


/* --- тап-зум на фото --- */
.dgal .rimg, .dimg{cursor:pointer; -webkit-tap-highlight-color:transparent;}
.dgal .rimg img, .dimg img{transition:transform .5s cubic-bezier(.22,.9,.3,1.15); will-change:transform;}
.dgal .rimg:active img{transform:scale(1.08);}
.dimg:active img{transform:scale(1.05);}


</style>
</head>

очный многослойный торт с насыщенным вкусом банан-карамель.<\/p><p>Карамельный бисквит с пропиткой боб тонка, нежный классический чиз, шоколадно-ореховая хрустяшка, сливочный крем и кусочки банана.<\/p><p>Забирай рецепт себе в копилочку — уверена, это сочетание вкуса и текстуры никого не оставит равнодушным!", "img": "img/base-04-tort-bananovyi-chi.webp"}, {"t": "Торт «Карпатка с вишней»", "sub": "Рецепт", "full": "Традиционный польский торт (пирог/пирожное), покоривший всех своими рельефными коржами, которые так напоминают Карпатские горы.<\/p><p>Заварное тесто, заварной крем, вишнёвая начинка и посыпка из сахарной пудры. Получается невероятно нежный торт со сливочным вкусом и лёгкой кислинкой.", "img": "img/base-05-tort-karpatka-s-vi.webp"}, {"t": "Торт «Чиприани»", "sub": "Рецепт", "full": "Сегодня предлагаю приготовить мой вариант знаменитого во всём мире нежного торта из итальянского ресторана Чиприани.<\/p><p>Тонкие бисквиты с цитрусовой пропиткой и прослойка лимонного крема на заварной основе с белым шоколадом и воздушными сливками.<\/p><p>Но главная фишка торта — обожжённая шапочка меренги, которая идеально балансирует сладость с приятной кислинкой. Торт получается очень лёгкий в сборке и невероятно вкусный!", "img": "img/base-06-tort-chipriani.webp"}, {"t": "Лимонный чизкейк", "sub": "Рецепт", "full": "Песочная основа с тонким сливочным вкусом — и потрясающий чизкейк с цитрусовым заварным кремом и белым шоколадом.<\/p><p>Десерт получается очень сбалансированный по вкусу, не приторный и с нежной текстурой. А если украсить песочными кроликами на Пасху — идеальное лакомство к праздничному столу готово!", "img": "img/base-07-limonnyi-chizkeik.webp"}, {"t": "Торт «Тирамису»", "sub": "Рецепт", "full": "Невероятный десерт с обволакивающим кофейным вкусом!<\/p><p>Крем на маскарпоне, сливочная намелака «кофе-шоколад» и сочные бисквиты, пропитанные ароматным сиропом с кофейным ликёром Калуа.<\/p><p>Этот бодрящий десерт 100% станет хитом — клиенты будут в восторге, а близкие попросят добавки.", "img": "img/base-08-tort-tiramisu.webp"}, {"t": "Творожные сырки «Фисташка-малина»", "sub": "Рецепт", "full": "Фисташковые сырки с малиновой начинкой в шоколадной глазури — то самое полюбившееся многим сочетание.<\/p><p>Обязательно сделай этот простой и полезный вариант вкусного лакомства — родные и близкие точно оценят!", "img": "img/base-09-tvorozhnye-syrki-f.webp"}, {"t": "Маффины со смородиной", "sub": "Рецепт", "full": "Рыхлые, сочные и такие вкусные кексы с ягодами, а на контрасте с хрустящим штройзелем и кусочками шоколада, ммм… Это бомба!<\/p><p>Я обожаю шоколад со смородиной — она придаёт вкусу лёгкую кислинку. Но ты можешь добавить свою любимую ягоду.<\/p><p>Обязательно приготовь эти маффины — близкие точно будут в восторге и захотят ещё.", "img": "img/base-10-maffiny-so-smorodi.webp"}, {"t": "Булочки с бананом и грецким орехом", "sub": "Рецепт", "full": "Пуховые булочки — сочные, воздушные и без яиц. Внутри прослойка из банана, корицы, щепотки орешков и шоколада. А тростниковый сахар придаст сдобе приятный карамельный вкус.<\/p><p>И прежде чем экспериментировать с начинкой улиток — рекомендую попробовать именно такой вариант.", "img": "img/base-11-bulochki-s-bananom.webp"}, {"t": "Порционный чизкейк «Сникерс»", "sub": "Рецепт", "full": "Вкусный порционный десерт на палочке по мотивам любимого батончика.<\/p><p>Основа из юбилейного печенья с орешками, нежный арахисовый чиз и солёный арахис в карамели под тонким слоем шоколадной глазури.<\/p><p>Мини-чизкейки отлично подойдут для любого праздника и придутся по вкусу друзьям и близким.", "img": "img/base-12-portsionnyi-chizke.webp"}, {"t": "Крем-брюле", "sub": "Рецепт", "full": "Крем-брюле — знаменитый десерт родом из Франции XVII века. Его полюбили за контраст текстур: нежного ванильного крема и хрустящей карамельной корочки сверху.<\/p><p>Обязательно попробуй приготовить крем-брюле — и увидишь, как из обычных продуктов может получиться изысканный десерт!", "img": "img/base-13-krem-bryule.webp"}, {"t": "Торт «Три шоколада»", "sub": "Рецепт", "full": "Идеальный десерт для любителей шоколада — сочный шоколадный бисквит и три слоя бархатного мусса из баварского крема на основе «Англез».<\/p><p>Уверена, этот нежный торт со вкусом тёмного, молочного и белого шоколада станет хитом у близких и клиентов!", "img": "img/base-14-tort-tri-shokolada.webp"}, {"t": "Фисташковый рулет со свежей малиной", "sub": "Рецепт", "full": "Сочный меренговый рулет с насыщенным фисташковым кремом и свежей малиной, а посыпка из хрустящих орешков идеально дополнит нежную текстуру.<\/p><p>Обязательно сделай это безупречное лакомство на праздник или просто к чаю — он настолько прост в приготовлении, что уже через час можно подавать к столу!", "img": "img/base-15-fistashkovyi-rulet.webp"}, {"t": "Муссовое пирожное «Тропик»", "sub": "Рецепт", "full": "Предлагаю приготовить очень вкусное и нежное, как облачко, потрясающее пирожное.<\/p><p>Хрустящий снаружи и мягкий внутри миндальный бисквит Дакуаз идеально сочетается с лёгким муссом на белом шоколаде и конфи манго-маракуйя.<\/p><p>Насыщенный вкус и яркий аромат напоминают отдых на тропическом пляже под ласковым солнцем…", "img": "img/base-16-mussovoe-pirozhnoe.webp"}, {"t": "Poppy cake", "sub": "Рецепт", "full": "Poppy Cake — ароматный маковый бисквит, яркая вишнёвая начинка и сливочный крем из маскарпоне и сгущёнки.<\/p><p>Торт получается очень сочным, нежным и в меру сладким. Можно украсить шоколадной глазурью или свежей вишней с хвостиками.<\/p><p>Обязательно приготовь этот удивительный десерт — уверена, он станет хитом у близких и клиентов!", "img": "img/base-17-poppy-cake.webp"}, {"t": "Сочный кекс «Брауни» с чизкейком", "sub": "Рецепт", "full": "Брауни — всемирно известный десерт, получивший своё название благодаря насыщенному коричневому цвету.<\/p><p>Он может стать отличной основой для многих десертов — например, для этого сочного кекса: в сочетании с нежнейшим чизкейком остановиться на одном кусочке просто невозможно!<\/p><p>Мягкий, слегка влажный брауни с насыщенным вкусом тёмного шоколада и сливочная прослойка чизкейка под шоколадной глазурью — десерт прекрасно подойдёт к кофе или чаю.", "img": "img/base-18-sochnyi-keks-braun.webp"}, {"t": "Апельсиновые бабы", "sub": "Рецепт", "full": "Необычный и простой в приготовлении вариант всеми любимой сдобы. Нежные, сочные бабы с пористой текстурой, а в сочетании с цедрой апельсина и шоколадной глазурью получаются невероятно вкусными.<\/p><p>Обязательно побалуй себя и близких этим удивительным лакомством на праздник или просто к чаю!", "img": "img/base-19-apelsinovye-baby.webp"}, {"t": "Сладкие горшочки с цветами", "sub": "Рецепт", "full": "Нежные и невероятно вкусные — горшочки из шоколада с живыми цветами.<\/p><p>Идеальное сочетание шоколадного бисквита, сливочного крема на маскарпоне и яркой вишнёвой начинки с лёгкой кислинкой.<\/p><p>Это оригинальное угощение станет запоминающимся подарком на 8 марта.", "img": "img/base-20-sladkie-gorshochki.webp"}, {"t": "Муссовый торт «Сердце»", "sub": "Рецепт", "full": "Я приготовила для тебя самый настоящий символ любви — торт в форме сердца.<\/p><p>Ароматный миндальный бисквит с клубничной начинкой и нежным манговым муссом под слоем шоколадного велюра — гармоничное сочетание вкуса и воздушной текстуры.<\/p><p>Идеальный вариант для 14 февраля — порадуй свою вторую половинку или себя этим романтичным лакомством!", "img": "img/base-21-mussovyi-tort-serd.webp"}, {"t": "Эстерхази", "sub": "Рецепт", "full": "Вариантов приготовления знаменитого торта «Эстерхази» много, но я предлагаю более лёгкую версию в моём прочтении.<\/p><p>Ореховые коржи, воздушный сливочный крем на пралине и паутинка из шоколада — торт получается менее жирным и более насыщенным на вкус.<\/p><p>Для коржей берём два вида ореховой муки, хотя с фундучной тоже будет отлично!", "img": "img/base-22-esterhazi.webp"}, {"t": "Пари-Брест с кремом «Муслин»", "sub": "Рецепт", "full": "Пари-Брест — культовый французский десерт, созданный в 1891 году шеф-кондитером Луи Дюраном в честь первого велосипедного марафона «Париж-Брест-Париж». Его круглая форма напоминает велосипедное колесо.<\/p><p>Десерт готовят из заварного теста, наполняя кремом с добавлением пралине. Готовые пирожные украшают миндальными лепестками — это придаёт им не только изысканный вкус, но и узнаваемый внешний вид.", "img": "img/base-23-pari-brest-s-kremo.webp"}, {"t": "Ароматные пряники с цукатами", "sub": "Рецепт", "full": "Эти пряники — настоящее удовольствие для любителей ароматной праздничной выпечки! Мягкие и нежные, они идеально подходят к чашке чая или кофе.<\/p><p>А цукаты добавляют яркости вкусу и делают каждый кусочек ещё более аппетитным. Обязательно их приготовь и порадуй близких.", "img": "img/base-24-aromatnye-pryaniki.webp"}, {"t": "Чизкейк шоколад-фундук", "sub": "Рецепт", "full": "Нежнейшая фундучная основа, насыщенный шоколадный чиз и яркая экзотическая начинка — такой десерт приятно удивит даже самых искушённых.<\/p><p>Обязательно попробуй его приготовить — уверена, клиенты и домашние будут в восторге.", "img": "img/base-25-chizkeik-shokolad.webp"}, {"t": "Торт «Бонни»", "sub": "Рецепт", "full": "Этот торт ты просто обязана приготовить, и как можно скорее. Обещаю, что влюбишься и будешь повторять снова и снова.<\/p><p>Воздушные бисквиты с шоколадной ноткой, сливочный арахисовый крем, хрустящий слой с вафлей и арахисом, карамелизированный банан и покрытие шоколадным кремом, который обязательно заберёшь в копилку любимых рецептов. Только представь это сочетание!", "img": "img/base-26-tort-bonni.webp"}, {"t": "Пицца: Маргарита и Груша-сыр", "sub": "Рецепт", "full": "Все, кто готовил по этому рецепту, говорят, что это самая вкусная пицца в домашних условиях! А ведь он существует уже более 5 лет)<\/p><p>Главное, чтобы был баланс между начинкой и тестом и пицца не превратилась в «сборную солянку». В рецепте два варианта: классическая Маргарита и груша-сыр с голубой плесенью.", "img": "img/base-27-pitstsa-margarita.webp" const wrap=document.getElementById('dash');
let active=0, detail=null;
const CHEV='';
const IC_PLAY=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const IC_DOC=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>`;
const IC_CHECK=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
function cardHTML(s,it,i){
  if(s.style==='recipe') return `<div class="rcard" data-c="${i}"><div class="rimg">${it.img?`<img loading="lazy" decoding="async" src="${it.img}" alt="">`:''}</div><div class="rname">${it.t}</div></div>`;
  if(s.style==='list'){
    const icon = s.ic==='doc' ? IC_DOC : s.ic==='check' ? IC_CHECK : IC_PLAY;
    const dc = s.noopen ? '' : ` data-c="${i}"`;
    return `<div class="lrow${s.noopen?' noopen':''}"${dc}><div class="lic">${icon}</div><div class="ltext"><div class="lname">${it.t}</div><div class="lsub">${it.sub||''}</div></div></div>`;
  }
  if(s.style==='pro') return `<div class="pcard" data-c="${i}"><div class="pimg">${it.soon?`<div class="psoon">Скоро</div>`:''}${it.img?`<img loading="lazy" decoding="async" src="${it.img}" alt="">`:''}</div><div class="pbody"><div class="pname">${it.t}</div><div class="pdesc">${it.desc||''}</div></div></div>`;
  return `<div class="ccard" data-c="${i}"><div class="cimg">${it.img?`<img loading="lazy" decoding="async" src="${it.img}" alt="">`:''}</div><div class="cbody"><div class="cname">${it.t}</div><div class="cdesc">${it.desc||''}</div></div></div>`;
}
const CHEV_R=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;
function contentHTML(s){
  let fi=s.items.findIndex(x=>x.feat); if(fi<0) fi=0;
  const f=s.items[fi];
  const hero=`<div class="chero"><div class="cheroimg">${f.img?`<img loading="lazy" decoding="async" src="${f.img}" alt="">`:''}</div><div class="cheroscrim"></div><div class="cheroin"><div class="cherottl">${f.t}</div><div class="cherodesc">${f.desc||f.full||''}</div></div></div>`;
  const rows=s.items.map((it,i)=>i===fi?'':`<div class="mrow"><div class="mthumb">${it.img?`<img loading="lazy" decoding="async" src="${it.img}" alt="">`:''}</div><div class="mname">${it.t}</div><div class="mchev">${CHEV_R}</div></div>`).join('');
  return `${hero}<div class="pastlbl">Прошлые месяцы</div><div class="mlist">${rows}</div>`;
}
function tabsHTML(){ return DATA.map((t,i)=>`<button class="tab${i===active?' active':''}" data-i="${i}">${t.label}</button>`).join(''); }
function render(){
  const s=DATA[active];
  if(detail===null){
    const cards=s.items.map((it,i)=>cardHTML(s,it,i)).join('');

    wrap.querySelectorAll('[data-c]').forEach(el=>el.onclick=()=>{detail=+el.dataset.c; render();});
  } else {
    const it=s.items[detail];
    const prog = it.gallery && it.gallery.length ? `<div class="dprog">В программе:</div><div class="grid dgal">${it.gallery.map(g=>`<div class="rcard"><div class="rimg">${g.img?`<img loading="lazy" decoding="async" src="${g.img}">`:''}</div><div class="rname">${g.n}</div></div>`).join('')}</div>` : (it.lessons && it.lessons.length ? `<div class="dprog">В программе:</div><div class="dlessons">${it.lessons.map(l=>`<div class="dles"><div class="dles-t">${l.t}</div>${l.s?`<div class="dles-s">${l.s}</div>`:''}</div>`).join('')}</div>` : (it.prog && it.prog.length ? `<div class="dprog">В программе:</div><ul class="dlist">${it.prog.map(p=>`<li>${p}</li>`).join('')}</ul>` : ''));

    wrap.innerHTML=`<div class="panel"><div class="tabs">${tabsHTML()}</div><button class="dback">‹ Назад</button><div class="dscroll">${img}<div class="dsub">${it.sub||''}</div><div class="dtitle">${it.t}</div><div class="dtext">${it.full||''}</div>${prog}</div></div>`;
    wrap.querySelector('.dback').onclick=()=>{detail=null; render();};
  }

}
